name: Run Step 16 and Step 17 Analyses

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-step16-17-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-step16-17:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify prerequisites
        run: |
          python scripts/check_step_13_modeling_matrices.py
          python scripts/check_step_14_original_baseline.py
          python scripts/check_step_15_rewrite_degradation.py
          python scripts/check_step_16_rewritten_condition_classification.py

      - name: Run Step 17 distance analysis
        run: |
          python scripts/18_run_burrows_delta_distance.py
          python scripts/check_step_17_burrows_delta_distance.py

      - name: Commit Step 17 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/results/burrows_delta_text_to_author.csv \
            metadata/inter_author_distance_matrices.csv \
            metadata/inter_author_distance_summary.csv \
            metadata/author_centroid_shift_summary.csv \
            metadata/burrows_delta_distance_manifest.csv \
            logs/step_17_burrows_delta_distance_report.md
          if git diff --cached --quiet; then
            echo "No Step 17 output changes to commit."
          else
            git commit -m "Step 17: add Burrows Delta distance analysis results"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
