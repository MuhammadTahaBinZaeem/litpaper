name: Run Step 16 Rewritten-Condition Classification

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/run_step16.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-step16-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-step16:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify prerequisites
        run: |
          python scripts/check_step_13_modeling_matrices.py
          python scripts/check_step_14_original_baseline.py
          python scripts/check_step_15_rewrite_degradation.py

      - name: Run Step 16 rewritten-condition classification
        run: |
          python scripts/17_run_rewritten_condition_classification.py
          python scripts/check_step_16_rewritten_condition_classification.py

      - name: Commit Step 16 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/results/rewritten_condition_author_predictions.csv \
            metadata/rewritten_condition_author_metrics.csv \
            metadata/rewritten_condition_author_survival_summary.csv \
            metadata/rewritten_condition_author_confusion_matrices.csv \
            metadata/rewritten_condition_author_classification_report.csv \
            metadata/rewritten_condition_author_manifest.csv \
            logs/step_16_rewritten_condition_classification_report.md
          if git diff --cached --quiet; then
            echo "No Step 16 output changes to commit."
          else
            git commit -m "Step 16: add rewritten-condition author classification results"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
