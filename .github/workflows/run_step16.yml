name: Run Step 16 to Step 20 Analyses

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-step16-20-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-step16-20:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify prerequisites
        run: |
          python scripts/check_step_13_modeling_matrices.py
          python scripts/check_step_14_original_baseline.py
          python scripts/check_step_15_rewrite_degradation.py
          python scripts/check_step_16_rewritten_condition_classification.py
          python scripts/check_step_17_burrows_delta_distance.py
          python scripts/check_step_18_feature_family_vulnerability.py
          python scripts/check_step_19_tables_figures.py

      - name: Run Step 20 final reproducibility audit
        run: |
          python scripts/21_final_reproducibility_audit.py
          python scripts/check_step_20_final_audit.py

      - name: Commit Step 20 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            metadata/final_reproducibility_manifest.csv \
            metadata/final_step_status.csv \
            metadata/paper_claim_support_matrix.csv \
            logs/final_reproducibility_audit_report.md \
            logs/final_paper_readiness_summary.md
          if git diff --cached --quiet; then
            echo "No Step 20 output changes to commit."
          else
            git commit -m "Step 20: add final reproducibility audit package"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
