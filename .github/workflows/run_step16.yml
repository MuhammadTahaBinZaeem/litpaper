name: Run Step 16 to Step 18 Analyses

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-step16-18-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-step16-18:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify prerequisites
        run: |
          python scripts/check_step_13_modeling_matrices.py
          python scripts/check_step_14_original_baseline.py
          python scripts/check_step_15_rewrite_degradation.py
          python scripts/check_step_16_rewritten_condition_classification.py
          python scripts/check_step_17_burrows_delta_distance.py

      - name: Run Step 18 feature-family vulnerability analysis
        run: |
          python scripts/19_run_feature_family_vulnerability.py
          python scripts/check_step_18_feature_family_vulnerability.py

      - name: Commit Step 18 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/results/feature_family_degradation_predictions.csv \
            metadata/feature_family_degradation_metrics.csv \
            metadata/feature_family_vulnerability_summary.csv \
            metadata/feature_family_distance_contraction.csv \
            metadata/feature_family_centroid_shift.csv \
            metadata/feature_family_vulnerability_manifest.csv \
            logs/step_18_feature_family_vulnerability_report.md
          if git diff --cached --quiet; then
            echo "No Step 18 output changes to commit."
          else
            git commit -m "Step 18: add feature-family vulnerability results"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
