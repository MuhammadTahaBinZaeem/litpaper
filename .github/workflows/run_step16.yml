name: Run Step 16 to Step 19 Analyses

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-step16-19-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-step16-19:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify prerequisites
        run: |
          python scripts/check_step_13_modeling_matrices.py
          python scripts/check_step_14_original_baseline.py
          python scripts/check_step_15_rewrite_degradation.py
          python scripts/check_step_16_rewritten_condition_classification.py
          python scripts/check_step_17_burrows_delta_distance.py
          python scripts/check_step_18_feature_family_vulnerability.py

      - name: Run Step 19 statistical tables and figures
        run: |
          python scripts/20_generate_statistical_tables_figures.py
          python scripts/check_step_19_tables_figures.py

      - name: Commit Step 19 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            metadata/paper_table_original_baseline.csv \
            metadata/paper_table_transfer_degradation.csv \
            metadata/paper_table_same_condition_survival.csv \
            metadata/paper_table_distance_contraction.csv \
            metadata/paper_table_feature_family_vulnerability.csv \
            metadata/statistical_tests_bootstrap_macro_f1_loss.csv \
            metadata/step19_tables_figures_manifest.csv \
            figures/fig_step19_macro_f1_degradation.svg \
            figures/fig_step19_distance_contraction.svg \
            figures/fig_step19_feature_family_losses.svg \
            logs/step_19_tables_figures_report.md
          if git diff --cached --quiet; then
            echo "No Step 19 output changes to commit."
          else
            git commit -m "Step 19: add statistical tables and figures"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
