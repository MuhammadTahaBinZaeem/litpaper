name: Gutenberg canonical migration

on:
  workflow_dispatch:

jobs:
  build-gutenberg-layer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Project Gutenberg sources
        run: python scripts/04_fetch_gutenberg_sources.py

      - name: Upload Gutenberg migration outputs
        uses: actions/upload-artifact@v4
        with:
          name: gutenberg-canonical-source-layer
          path: |
            data/raw/gutenberg_texts/
            metadata/gutenberg_raw_text_checksums.csv
            logs/gutenberg_fetch_report.md
          if-no-files-found: error
