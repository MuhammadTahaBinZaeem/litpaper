name: Run Step 15 Degradation Experiment

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/run_step15.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-step15-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-step15:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify prerequisites
        run: |
          python scripts/check_step_13_modeling_matrices.py
          python scripts/check_step_14_original_baseline.py

      - name: Run Step 15 degradation experiment
        run: |
          python scripts/16_run_original_to_rewritten_degradation.py
          python scripts/check_step_15_rewrite_degradation.py

      - name: Commit Step 15 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/results/original_to_rewritten_predictions.csv \
            metadata/original_to_rewritten_metrics.csv \
            metadata/original_to_rewritten_degradation_summary.csv \
            metadata/original_to_rewritten_confusion_matrices.csv \
            metadata/original_to_rewritten_classification_report.csv \
            metadata/original_to_rewritten_manifest.csv \
            logs/step_15_original_to_rewritten_degradation_report.md
          if git diff --cached --quiet; then
            echo "No Step 15 output changes to commit."
          else
            git commit -m "Step 15: add original-to-rewritten degradation results"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
